# NeurIPS2026 実験用 Nginx 設定テンプレート
# 配置先: /etc/nginx/sites-available/neurips2026
# 有効化: ln -s /etc/nginx/sites-available/neurips2026 /etc/nginx/sites-enabled/
#
# {{DOMAIN}} は setup.sh が sed で置換する。手動で書き換える場合はここを直接編集。

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Let's Encrypt の HTTP-01 challenge 用に webroot を残しつつ、
    # それ以外は HTTPS にリダイレクト
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    # certbot が後から書き込む（setup.sh が `certbot --nginx` を実行する）
    # ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    root /var/www/neurips2026;
    index index.html;

    # 静的ファイルを配信
    location / {
        try_files $uri $uri/ =404;
    }

    # キャッシュ制御（実験中は更新が頻繁なのでアグレッシブにキャッシュしない）
    location ~* \.(js|css|html)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Live2D の CORS ヘッダ等は CDN 側で処理されるのでここでは不要

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # セキュリティヘッダ
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ログ
    access_log /var/log/nginx/neurips2026.access.log;
    error_log  /var/log/nginx/neurips2026.error.log;
}
